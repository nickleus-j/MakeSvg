name: Build and Publish to Docker Hub

on:
  push:
    branches: [ "main" ]
    # Triggers only when changes are made within the SvgMaker folder
    paths:
      - 'SvgMaker/**'
  workflow_dispatch: # Allows manual triggering

jobs:
  push_to_registry:
    name: Push Docker image to Docker Hub
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/svg-maker

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          # This points to the subdirectory where your Dockerfile/source is
          context: .
          # If your Dockerfile is named differently or elsewhere, uncomment below:
          file: ./Dockerfile 
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}